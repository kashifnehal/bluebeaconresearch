<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0e0e0e;
        }

<body class="font-body text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<!-- Suppressing SideNav/TopNav as per "The Destination Rule" for transactional screens -->
<main class="w-full max-w-[1440px] flex justify-center">
<!-- Signup Card -->
<div class="w-full max-w-[440px] bg-surface rounded-[16px] border border-[#484848] p-8 shadow-2xl relative overflow-hidden">
<!-- Tactical Status Ribbon -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-primary"></div>
<!-- Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="flex items-center gap-2 mb-6">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="terminal">terminal</span>
<span class="font-headline font-extrabold text-xl tracking-tighter text-on-surface">Blue Beacon Research <span class="text-primary">Pro</span></span>
</div>
<h1 class="font-headline text-2xl font-bold tracking-tight text-on-surface text-center">Create your account</h1>
<p class="font-label text-xs uppercase tracking-widest text-on-surface-variant/70 mt-2 text-center">Start monitoring conflict intelligence</p>
</div>
<!-- Social Provider -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-surface-container hover:bg-surface-container-high transition-colors border border-outline-variant/30 rounded-lg group">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google multicolor G icon logo on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBGgojQLSXoqwoGuah8PWlwQZN5G4imYl2VNOG6cm9CepN-L-FZm-_sKI4NrLjauOl3yXa87aTJhvlvWXt5wIM0cRih20JjgsYmXiF5VRVZ1LSay9CddqUHxCZhIqDNPo10CPuHOINyIXOMmrr0m24iw4VgEgrNEh6J5kXERC5e_w6ST3ENkrz4hzpCTMhgf-Pw7ItYd5S_qHeqU7KKNFDQYcdcEvOqi_fn9Sh39JuvcbM62_U6AmChxdocDlLdaDbkjNzTsVDhkqoh"/>
<span class="font-label text-sm font-bold uppercase tracking-wider">Continue with Google</span>
</button>
<!-- Divider -->
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-surface px-4 font-data text-xs text-outline-variant uppercase">OR</span>
</div>
</div>
<!-- Form -->
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="font-label text-[10px] font-bold uppercase tracking-[0.2em] text-outline ml-1" for="email">Terminal Address</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant focus:border-primary focus:ring-0 font-data text-sm py-3 px-4 rounded-t-lg transition-all placeholder:text-outline-variant" id="email" placeholder="operator@bluebeaconresearch.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="font-label text-[10px] font-bold uppercase tracking-[0.2em] text-outline ml-1" for="password">Access Cipher</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant focus:border-primary focus:ring-0 font-data text-sm py-3 px-4 rounded-t-lg transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-1.5">
<label class="font-label text-[10px] font-bold uppercase tracking-[0.2em] text-outline ml-1" for="confirm-password">Confirm Cipher</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant focus:border-primary focus:ring-0 font-data text-sm py-3 px-4 rounded-t-lg transition-all placeholder:text-outline-variant" id="confirm-password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Security Protocol Note -->
<div class="flex items-start gap-2 pt-2">
<span class="material-symbols-outlined text-primary text-sm mt-0.5" data-icon="shield">shield</span>
<p class="text-[10px] text-on-surface-variant/60 font-body leading-relaxed">
                        By deploying, you agree to the <a class="text-primary hover:underline" href="#">Signal Protocols</a> and <a class="text-primary hover:underline" href="#">Data Transmission Terms</a>.
                    </p>
</div>
<!-- Primary Action Button -->
<button class="w-full mt-6 bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-label font-bold uppercase tracking-widest py-4 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(111,251,190,0.15)]" type="submit">
                    CREATE ACCOUNT
                </button>
</form>
<!-- Footer -->
<div class="mt-10 pt-6 border-t border-outline-variant/10 text-center">
<p class="font-body text-sm text-on-surface-variant/80">
                    Already have an account? 
                    <a class="font-label font-bold text-primary hover:text-primary-fixed ml-1 transition-colors uppercase tracking-tight" href="/signin">Sign in</a>
</p>
</div>
<!-- Background Aesthetic Element: Grid Overlay -->
<div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-primary/5 to-transparent pointer-events-none"></div>
</div>
</main>
<!-- Tactical HUD Element (Decorative) -->
<div class="fixed bottom-8 right-8 hidden md:flex flex-col items-end pointer-events-none">
<div class="font-data text-[10px] text-primary/40 uppercase tracking-tighter space-y-1">
<p>LAT: 38.8977° N</p>
<p>LON: 77.0365° W</p>
<p>ENC: AES-256-GCM</p>
<p>ST: AUTH_WAITING</p>
</div>
</div>
</body></html>
